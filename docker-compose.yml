version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wiki_trending_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    command: >
      bash -lc "pip install -e backend && uvicorn wiki_trending_agent.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/wiki_trending_agent
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    image: node:22
    working_dir: /app/frontend
    volumes:
      - ./:/app
    command: >
      bash -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
